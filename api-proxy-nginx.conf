server {
	listen 443 ssl;
	http2 on;
	server_name _;

	ssl_certificate /etc/nginx/tls/server.crt;
	ssl_certificate_key /etc/nginx/tls/server.key;

	ssl_client_certificate /etc/nginx/tls/gateway-ca.crt;
	ssl_verify_client optional;
	ssl_verify_depth 2;

	# add_header X-Debug-SSL-Verify $ssl_client_verify always;
	# add_header X-Debug-SSL-DN $ssl_client_s_dn always;

	# data ingestion : mTLS. Currently only ingest_report is concerned.
	# force client cert and forward identity as headers.
	location ~ ^/rpc/(ingest_report)$ {
		if ($ssl_client_verify != SUCCESS) { return 403; }

		proxy_pass http://postgREST:3000;

		# canonical names
		proxy_set_header X-Client-Verify $ssl_client_verify;
		proxy_set_header X-Client-DN $ssl_client_s_dn;

		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto https;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	# user traffic
	location / {
		proxy_pass http://postgREST:3000;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto https;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}
}
